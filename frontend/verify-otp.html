<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP | Inventory</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Verify OTP</h1>
      <p id="verifyHint">Enter OTP to complete verification.</p>

      <form id="verifyOtpForm" class="form-grid" autocomplete="off">
        <div class="form-row">
          <label for="verifyEmail">Email</label>
          <input id="verifyEmail" type="email" required />
        </div>
        <div class="form-row">
          <label for="verifyOtp">OTP</label>
          <input id="verifyOtp" type="text" maxlength="4" required placeholder="4-digit OTP" />
        </div>
        <input id="otpMode" type="hidden" value="register" />
        <button class="btn btn-block" type="submit">Verify & Continue</button>
      </form>

      <button id="resendOtpBtn" class="btn-ghost btn-block" type="button" style="margin-top:8px;">Resend OTP</button>
      <div id="verifyMessage" class="msg"></div>
      <div class="line"></div>
      <p class="small">Back to <a href="login.html" style="color:#0f766e;font-weight:700;">Login</a></p>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
